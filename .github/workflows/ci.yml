name: Build & Test CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'HANDOVER.md'
      - 'docs/**'
      - '.github/**'
      - 'Username & Password Test.md'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'HANDOVER.md'
      - 'docs/**'
      - '.github/**'
      - 'Username & Password Test.md'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Generate Prisma Client
      run: npx prisma generate
      
    - name: Build Application
      run: npm run build
